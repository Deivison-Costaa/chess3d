name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-cache

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset: ci-windows
            binary: build/bin/chess3d.exe
            triplet: x64-mingw-dynamic
          - os: ubuntu-latest
            preset: ci-linux
            binary: build/bin/chess3d
            triplet: x64-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── vcpkg cache ────────────────────────────────────────────────────────
      - name: Cache vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ matrix.triplet }}-

      - name: Create vcpkg binary cache dir
        shell: bash
        run: mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      # ── Platform setup ─────────────────────────────────────────────────────
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ninja-build cmake pkg-config \
            libgl-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev \
            stockfish

      - name: Install Windows tools (MinGW + Ninja)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-cmake

      # ── vcpkg ──────────────────────────────────────────────────────────────
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '5b1214315250939257ef5d62ecdcbca18cf4fb1c'

      # ── Configure ─────────────────────────────────────────────────────────
      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-mingw-dynamic \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DCMAKE_BUILD_TYPE=Release

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake --build build --parallel

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build --parallel

      # ── Unit tests (Catch2 fast) ───────────────────────────────────────────
      - name: Catch2 tests (fast)
        run: ctest --test-dir build --output-on-failure --label-exclude slow

      # ── Unit tests (slow perft) — optional ─────────────────────────────────
      - name: Catch2 tests (slow perft)
        run: ctest --test-dir build --output-on-failure -L slow --timeout 300
        continue-on-error: true   # perft may be too slow on shared runners

      # ── Headless smoke test ────────────────────────────────────────────────
      - name: Headless smoke (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          out=$(./build/bin/chess3d.exe --auto --max-plies 150 --print-result 2>&1)
          echo "$out"
          echo "$out" | grep -q "^RESULT " || { echo "FAIL: no RESULT line"; exit 1; }

      - name: Headless smoke (Linux)
        if: runner.os == 'Linux'
        run: |
          out=$(./build/bin/chess3d --auto --max-plies 150 --print-result 2>&1)
          echo "$out"
          echo "$out" | grep -q "^RESULT " || { echo "FAIL: no RESULT line"; exit 1; }

  # ── LAN interop (Linux only: two chess3d processes on localhost) ────────────
  lan-interop:
    name: LAN Interop (Linux)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-x64-linux-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-x64-linux-

      - name: Create vcpkg binary cache dir
        run: mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ninja-build cmake pkg-config \
            libgl-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '5b1214315250939257ef5d62ecdcbca18cf4fb1c'

      - name: Configure & Build
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: LAN interop — Linux ↔ Linux
        run: |
          python3 tests/scripts/run_lan_match.py \
            --bin-a build/bin/chess3d \
            --bin-b build/bin/chess3d \
            --port 5200 \
            --max-plies 200 \
            --timeout 90
